version: 2
updates:
  # The pip ecosystem entry covers BOTH pyproject.toml (project deps + the
  # `dev` optional-deps group) AND requirements-dev.txt (the hash-pinned
  # lockfile generated by `pip-compile --generate-hashes`). Dependabot
  # auto-discovers requirements*.txt files in the configured directory and
  # recognises the pip-compile-autogenerated header, so version bumps
  # regenerate the hashes correctly.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels: ["dependencies", "ci"]
