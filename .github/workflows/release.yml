name: Release

# Builds an sdist and wheel from a v* tag, signs each with Sigstore
# keyless cosign (the workflow's GitHub OIDC identity is exchanged for
# a short-lived Fulcio certificate — no long-lived signing key is
# stored anywhere), and publishes the artifacts plus their Sigstore
# bundles to the matching GitHub Release.
#
# Verification model
#   Each release artifact ships with a `.sigstore.json` bundle that
#   packs the signature, the Fulcio certificate, and the Rekor
#   transparency-log inclusion proof. A verifier downloads the
#   artifact + bundle and runs:
#       cosign verify-blob \
#           --bundle <artifact>.sigstore.json \
#           --certificate-identity-regexp 'github.com/DocGerd/hangarfit/.github/workflows/release.yml@.*' \
#           --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
#           <artifact>
#   The cert chains to Sigstore's root, and the identity check pins
#   the signature to *this workflow path* on *this repository*. No
#   long-lived key material to compromise.
#
# Why artifact signing rather than `git tag -s` (GPG-signed tags)
#   Scorecard's `Signed-Releases` check inspects *Release artifacts*,
#   not tag objects (https://github.com/ossf/scorecard/blob/main/docs/checks.md#signed-releases).
#   GPG-signed tags are fine on their own merits but do not move this
#   check. Keyless cosign also avoids the operational tax of
#   maintaining a GPG key for a single-maintainer project.
#
# Triggers
#   - `push: tags: ['v*']` — automatic for new releases.
#   - `workflow_dispatch` with `tag` input — manual re-run on an
#     existing tag, used for backfilling pre-existing releases or
#     re-signing after a transient failure.
#
# Refs: closes #138 (raises the Scorecard Signed-Releases score).

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and (re-)release (e.g. v0.6.0).'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  # `github.ref_name` returns the bare tag name for tag pushes, which
  # matches the shape of the dispatch input. Using the same key for
  # both triggers prevents a push and a dispatch of the same tag from
  # racing.
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, sign, and publish release artifacts
    runs-on: ubuntu-latest
    permissions:
      # `gh release create` / `gh release upload` mutate Release
      # objects, which live under the `contents` scope of GITHUB_TOKEN.
      contents: write
      # Required for Sigstore keyless signing — cosign reads the
      # `ACTIONS_ID_TOKEN_REQUEST_TOKEN` / `ACTIONS_ID_TOKEN_REQUEST_URL`
      # env vars that `id-token: write` makes available, exchanges the
      # OIDC token for a short-lived Fulcio certificate, and uses it
      # to sign.
      id-token: write

    steps:
      - name: Resolve tag (push event or dispatch input)
        id: tag
        # User-controllable workflow_dispatch input is laundered via
        # env: so it can never end up inside the run: script as a
        # template-interpolated shell fragment. (See
        # https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/)
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "name=$DISPATCH_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out the tag's commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ steps.tag.outputs.name }}
          persist-credentials: false

      - name: Log resolved tag → commit binding
        # Makes the resolved commit SHA visible in the run log so an
        # attentive operator can spot a force-pushed tag pointing at a
        # different commit than was originally released. Tag/branch
        # protection (#141) is the proper defence; this log is the
        # cheap "we'd notice" signal.
        env:
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          set -euo pipefail
          sha=$(git rev-parse HEAD)
          echo "Building tag $TAG at commit $sha"

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Install the build toolchain (hash-pinned)
        # The signing workflow must build from a hash-verified toolchain.
        # An unpinned `build` frontend — or the isolated, unpinned backend
        # fetch that `python -m build` performs by default — would let a
        # `build`/`setuptools`/`wheel`/`packaging` package compromised on
        # PyPI taint the artifacts that this workflow then signs with its
        # legitimate Fulcio identity. The Sigstore signatures would still
        # verify; nothing would look broken. requirements-build.txt pins
        # build + setuptools + wheel (+ transitive pyproject-hooks,
        # packaging) with hashes. Addresses #168 and the release-side
        # backend gap (sibling of #162) — the PR body carries the
        # auto-closing `Closes`.
        run: pip install --require-hashes -r requirements-build.txt

      - name: Compute SOURCE_DATE_EPOCH from the tagged commit
        id: sde
        # SOURCE_DATE_EPOCH is the committer timestamp of the tagged
        # commit. Using the tag's own commit (not the tag-object date)
        # makes the value derivable by any verifier who has the tag:
        #   git log -1 --pretty=%ct <tag>
        # This is the canonical convention for Python sdist reproducible
        # builds; see docs/reproducible-builds.md for the full rationale
        # and third-party verification steps.
        run: |
          set -euo pipefail
          epoch=$(git log -1 --pretty=%ct)
          echo "epoch=$epoch" >> "$GITHUB_OUTPUT"
          echo "SOURCE_DATE_EPOCH=$epoch (from commit $(git rev-parse HEAD))"

      - name: Build sdist and wheel
        # --no-isolation builds with the hash-verified host toolchain
        # installed above instead of letting `build` create an isolated
        # env that re-fetches the PEP-517 backend (setuptools/wheel)
        # unpinned.
        #
        # SOURCE_DATE_EPOCH is exported so the build frontend and any
        # PEP-517 backend that honours it can use it directly. Setuptools
        # (the pinned backend, v82) does NOT fully honour it for sdists —
        # the gzip wrapper mtime and PAX-format fractional timestamps are
        # still sourced from the system clock. The normalization step
        # below rewrites those fields after the fact. The var is still
        # exported here as documentation intent and for any future
        # setuptools version that does honour it natively.
        env:
          SOURCE_DATE_EPOCH: ${{ steps.sde.outputs.epoch }}
        run: python -m build --no-isolation

      - name: Normalize sdist for byte-for-byte reproducibility
        # Setuptools v82 does not fully honour SOURCE_DATE_EPOCH when
        # building a .tar.gz sdist. Three fields remain non-deterministic
        # even when SOURCE_DATE_EPOCH is set:
        #
        #   1. Gzip wrapper mtime — tarfile.open() records time.time()
        #      rather than SOURCE_DATE_EPOCH in the gzip header.
        #   2. Gzip FNAME header field — encodes a temporary file-path
        #      that varies between invocations.
        #   3. PAX extended mtime — Python's tarfile uses PAX format,
        #      which stores mtime with sub-second precision in extended
        #      headers; this fractional part reflects the exact build
        #      moment.
        #   4. Generated-file mtimes — directories and generated files
        #      (PKG-INFO, setup.cfg, egg-info/) are created during the
        #      build and inherit the current clock time.
        #
        # scripts/normalize-sdist.py rewrites the sdist in-place:
        #   - sets every tar member's mtime to SOURCE_DATE_EPOCH (int)
        #   - clears pax_headers (removes fractional-mtime PAX fields)
        #   - zeroes uid/gid/uname/gname (build-host user info)
        #   - sorts members alphabetically
        #   - re-gzips with mtime=SOURCE_DATE_EPOCH, filename=''
        #
        # The wheel (.whl) is a zip archive; zip timestamps have only
        # 2-second resolution and setuptools/wheel already honours
        # SOURCE_DATE_EPOCH for zip entries. Wheel reproducibility is
        # therefore better than sdist but not yet guaranteed byte-for-byte
        # across toolchain versions — it is left as future work (STRETCH).
        # See docs/reproducible-builds.md for the full picture.
        env:
          SOURCE_DATE_EPOCH: ${{ steps.sde.outputs.epoch }}
        run: |
          set -euo pipefail
          sdist=$(find dist -maxdepth 1 -name '*.tar.gz' | head -1)
          python scripts/normalize-sdist.py "$SOURCE_DATE_EPOCH" "$sdist"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign each artifact with keyless cosign
        # `--yes` is the CI-safe non-interactive flag (replaces the
        # removed `--force` from cosign v2); on the SHA-256 / new-bundle
        # path it's effectively a no-op but is the documented form.
        #
        # `--bundle` writes a single self-contained Sigstore bundle
        # per artifact: it packs the signature, the Fulcio certificate,
        # and the Rekor transparency-log inclusion proof into one JSON
        # file. Verifiers run `cosign verify-blob --bundle <file>`.
        # (The deprecated `--output-signature`/`--output-certificate`
        # two-file form was rejected in favour of `--bundle` because
        # cosign v3 marks those flags deprecated.)
        run: |
          set -euo pipefail
          shopt -s failglob

          # Assert the build produced exactly the expected outputs.
          # Surfacing the error here rather than three steps later
          # when cosign can't open a literal "*.tar.gz" or "*.whl".
          sdist_count=$(find dist -maxdepth 1 -name '*.tar.gz' | wc -l)
          wheel_count=$(find dist -maxdepth 1 -name '*.whl' | wc -l)
          if [ "$sdist_count" -ne 1 ] || [ "$wheel_count" -ne 1 ]; then
            echo "Expected exactly 1 sdist + 1 wheel in dist/; got sdist=$sdist_count wheel=$wheel_count" >&2
            ls -la dist/ >&2
            exit 1
          fi

          for artifact in dist/*.tar.gz dist/*.whl; do
            cosign sign-blob --yes \
              --bundle "${artifact}.sigstore.json" \
              "${artifact}"
          done

          # Post-sign invariant: each artifact must have a bundle.
          # Makes the no-partial-signing rule load-bearing so a future
          # refactor (e.g. splitting sign + upload across jobs) can't
          # silently propagate half-signed state.
          for artifact in dist/*.tar.gz dist/*.whl; do
            [ -f "${artifact}.sigstore.json" ] || {
              echo "Missing .sigstore.json bundle for $artifact" >&2
              exit 1
            }
          done

          ls -la dist/

      - name: Build release notes from the CHANGELOG section
        # The published Release description should carry this version's
        # CHANGELOG block, not the bare tag annotation (which `--notes-from-tag`
        # would otherwise use — leaving the page showing only "Release vX.Y.Z").
        # We run on the tag's checked-out commit, so CHANGELOG.md is the tagged
        # version's. Extract the `## [X.Y.Z]` block (details + edge cases inline
        # below), append the compare-link footer, and — if the section is absent
        # (a tag/CHANGELOG mismatch) — fall back to a minimal pointer with a loud
        # warning so the release still publishes rather than failing on empty
        # notes.
        env:
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          # Extract the section body up to the next version heading OR the bottom
          # `[x.y.z]: …` link-reference block — so the file's LAST section does
          # not sweep in the link list. Literal-prefix match → the dotted version
          # needs no regex escaping; the trailing space pins it to
          # `## [X.Y.Z] — DATE` and stops `0.1.0` matching `0.10.0`.
          section="$(awk -v h="## [${VERSION}] " '
            index($0, h) == 1            { f = 1; next }
            /^## \[/ || /^\[[^]]+\]: /   { if (f) exit }
            f                            { print }
          ' CHANGELOG.md)"
          # $() already strips trailing blank lines; drop the leading ones too.
          section="$(printf '%s\n' "$section" | sed '/./,$!d')"
          if [ -n "$section" ]; then
            printf '%s\n' "$section" > "$NOTES_FILE"
            # Append the "Full changelog" compare link if CHANGELOG defines one.
            # `|| true` only softens grep's rc=1 (link not defined yet); a real
            # read error can't reach here — the awk above already read the file.
            link_line=$(grep -m1 -F "[${VERSION}]: http" CHANGELOG.md || true)
            if [ -n "$link_line" ]; then
              printf '\n---\n**Full changelog:** %s\n' "${link_line#*: }" >> "$NOTES_FILE"
            fi
          else
            # No usable section. Publish a minimal pointer rather than blocking a
            # signed release — but make the degraded path LOUD (a stderr line on
            # a green job is too easy to miss) and say WHICH failure it was.
            if grep -qF "## [${VERSION}]" CHANGELOG.md; then
              msg="found a '## [${VERSION}]' heading but no body — check the heading format ('## [${VERSION}] — DATE') or an empty section"
            else
              msg="no '## [${VERSION}]' section in CHANGELOG.md"
            fi
            echo "::warning title=Release notes::${msg}; published ${TAG} with minimal fallback notes."
            echo "⚠️ Release ${TAG} published with FALLBACK notes — ${msg}." >> "$GITHUB_STEP_SUMMARY"
            printf 'Release %s.\n\nSee [CHANGELOG.md](https://github.com/DocGerd/hangarfit/blob/%s/CHANGELOG.md) for details.\n' "$TAG" "$TAG" > "$NOTES_FILE"
          fi
          echo "NOTES_FILE=$NOTES_FILE" >> "$GITHUB_ENV"
          { echo "--- release notes preview ---"; cat "$NOTES_FILE"; } >&2

      - name: Create or reuse a draft GitHub Release
        # Immutable-releases contract: a PUBLISHED release is sealed — its
        # assets can no longer be uploaded (the upload step would 422).
        # So we create the release as a DRAFT, attach the signed artifacts
        # while it is still mutable (next step), then flip it to published
        # in the final step. Notes stay editable even after publish; only
        # assets are sealed.
        #
        # `gh release view` returns exit code 1 for *all* of:
        # release-not-found, auth failure, network error, 5xx,
        # rate-limit. Swallowing stderr would conflate them and a
        # transient API blip would silently push us into a confusing
        # `release already exists` error from `gh release create`
        # downstream. Capture stderr; only treat literal
        # "release not found" as the create signal.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          set -euo pipefail
          view_out=$(gh release view "$TAG" 2>&1) && view_rc=0 || view_rc=$?
          if [ "$view_rc" -eq 0 ]; then
            # Already exists. A draft is fine to reuse (a prior run may
            # have created it then failed before publishing). A published
            # release is immutable — its assets cannot be replaced — so
            # bail with an actionable message instead of a raw 422 from
            # the upload step.
            # The probe above told us the release exists; this second
            # call distinguishes a reusable draft from a sealed published
            # release. Capture its exit status explicitly — a bare command
            # substitution under `set -e` does NOT abort inside `[ ... ]`,
            # so a transient failure here would otherwise compare an empty
            # string, misclassify a draft as published, and emit the wrong
            # hard-fail (the same conflation the primary probe avoids).
            is_draft=$(gh release view "$TAG" --json isDraft --jq '.isDraft') || {
              echo "gh release view --json isDraft failed for existing release $TAG" >&2
              exit 1
            }
            if [ "$is_draft" = "true" ]; then
              echo "Draft release for $TAG already exists; reusing it."
              # Refresh notes so a re-run picks up any CHANGELOG edits.
              gh release edit "$TAG" --notes-file "$NOTES_FILE"
            else
              echo "A PUBLISHED (immutable) release for $TAG already exists;" >&2
              echo "its assets cannot be modified. Delete it first, then re-run" >&2
              echo "this workflow via workflow_dispatch (tag=$TAG):" >&2
              echo "  gh release delete $TAG --yes   # the tag is preserved" >&2
              exit 1
            fi
          elif echo "$view_out" | grep -qxF "release not found"; then
            gh release create "$TAG" \
              --draft \
              --title "$TAG" \
              --notes-file "$NOTES_FILE"
          else
            echo "gh release view failed (rc=$view_rc) with unexpected output:" >&2
            echo "$view_out" >&2
            exit "$view_rc"
          fi

      - name: Upload signed artifacts to the Release
        # `--clobber` lets a re-run on the same tag overwrite the prior
        # upload — important for retry semantics (Fulcio outage, etc.)
        # but it *silently* replaces the prior Fulcio certificate with
        # a fresh one. The pre-flight WARNING below makes the
        # cert-rotation visible in the workflow log so external
        # verifiers caching the original cert know to refresh.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          set -euo pipefail
          shopt -s failglob

          assets=( dist/*.tar.gz dist/*.tar.gz.sigstore.json
                   dist/*.whl    dist/*.whl.sigstore.json )

          # Explicit existence check converts "missing upstream output"
          # from an opaque `gh release upload` error into a clear
          # "missing expected asset" failure attributed to the right
          # upstream step.
          for a in "${assets[@]}"; do
            [ -f "$a" ] || { echo "Missing expected asset: $a" >&2; exit 1; }
          done

          # Visibility for the clobber case — fresh Fulcio cert
          # replacing the original. The `|| true` covers both the
          # first-time-release path (the create step above just made an
          # empty draft; no assets to warn about) and transient API blips
          # here (the upload below will fail loudly on a real outage, so
          # we don't lose the error). `-F` on the grep makes the
          # asset-name match a fixed string — wheel filenames contain `.`
          # which would otherwise be a regex wildcard.
          existing=$(gh release view "$TAG" --json assets --jq '.assets[].name' 2>/dev/null || true)
          for a in "${assets[@]}"; do
            name=$(basename "$a")
            if echo "$existing" | grep -qxF "$name"; then
              echo "WARNING: about to clobber existing asset $name on $TAG (fresh Fulcio cert replaces the original)" >&2
            fi
          done

          gh release upload "$TAG" "${assets[@]}" --clobber

      - name: Publish the release (seals it immutably with assets attached)
        # The release was created as a draft and the signed assets were
        # uploaded above while it was still mutable. Flipping --draft=false
        # publishes it; under immutable releases this seals the assets in
        # place. Notes remain editable afterward, so a richer description
        # can still be set post-publish.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          set -euo pipefail
          gh release edit "$TAG" --draft=false
