name: CI

on:
  # Only run CI on PRs into integration/release branches — not cross-feature PRs.
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Required test suite, fanned out for wall-clock (#877).
  #
  # The single `test (Python 3.12)` job that used to run the whole suite under
  # coverage on ONE runner (~26 min) is split into parallel jobs whose results
  # are aggregated by the `test` GATE below:
  #   * `static`          — ruff + ruff-format + mypy (once)
  #   * `test-shard` (×3) — the non-slow, non-serial suite, sharded by recorded
  #                         duration (pytest-split) and run WITHOUT coverage
  #   * `serial-canaries` — the @serial wall-clock determinism canaries,
  #                         single-process, OUTSIDE the xdist pool
  #   * `test`            — the aggregator gate; keeps the exact required-check
  #                         name so branch protection needs no change (#880)
  #   * `coverage`        — NON-required; the Codecov signal, off the critical
  #                         path (#879)
  # ─────────────────────────────────────────────────────────────────────────

  static:
    name: static checks (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-python-env

      - name: Lint with ruff
        # bench/ is the dev-only solve→tow profiling harness (#381): not shipped
        # in any wheel, but linted here for consistency with src/ and tests/ (#463).
        run: ruff check src/ tests/ bench/

      - name: Check formatting with ruff
        run: ruff format --check src/ tests/ bench/

      - name: Type-check with mypy
        run: mypy src/hangarfit

  test-shard:
    name: test-shard (${{ matrix.group }} of 3)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-python-env

      - name: Run test shard ${{ matrix.group }}/3 (no coverage)
        # Required path runs WITHOUT --cov (#879): coverage is produced by the
        # separate, non-required `coverage` job below, off the merge-critical
        # path. pytest-split balances the three shards by recorded per-test
        # duration (the committed `.test_durations`) so each runner does ~equal
        # wall-clock; `-n auto` then parallelizes within the runner. `@serial` is
        # excluded here and run single-process in `serial-canaries` (the
        # determinism contract — see that job).
        #
        # `.test_durations` is generated with `--ignore=tests/ml` on purpose: a
        # dev box usually has torch (the [train] extra), so a bare regen would
        # record the *torch* ml tests' real (large) durations — but those tests
        # `importorskip`-SKIP in CI (CI installs only [dev], no torch), so feeding
        # those durations to the splitter would skew the split toward a phantom
        # heavy shard. The torch-free ml units that DO run in CI simply fall back
        # to pytest-split's average estimate, which keeps the shards balanced in
        # practice (the #883 CI run came out 5m37 / 5m58 / 4m43). Regenerate when
        # balance drifts:
        #   pytest -n auto -m "not slow and not serial" --ignore=tests/ml --store-durations
        run: pytest -n auto -m "not slow and not serial" --splits 3 --group ${{ matrix.group }}

  serial-canaries:
    name: serial canaries (determinism)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-python-env

      - name: Run @serial wall-clock determinism canaries (single-process)
        # The `serial`-marked canaries run solve() twice in-process under a
        # wall-clock budget and MUST stay OUTSIDE the pytest-xdist pool
        # (pyproject.toml `serial` marker; docs/dev/test-flakes-and-ci-gotchas.md
        # §1): under sibling-worker CPU starvation the two in-process solves can
        # complete different restart counts within the same budget and DIVERGE.
        # A dedicated unloaded runner also de-flakes them. No `-n` here — single
        # process by design.
        run: pytest -m "serial and not slow"

  test:
    # The aggregator GATE. Named exactly `test (Python 3.12)` so the existing
    # branch-protection required check keeps reporting with ZERO config change
    # while the work fans out across `static`, `test-shard` (×3) and
    # `serial-canaries` (#880). `if: always()` + the explicit result check makes
    # this go RED (not "skipped") when any upstream job fails, so a failure still
    # blocks merge. This job does no test work itself — it is the single required
    # status check that summarizes the fan-out.
    name: test (Python 3.12)
    needs: [static, test-shard, serial-canaries]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require all test jobs to have passed
        run: |
          echo "static=${{ needs.static.result }} test-shard=${{ needs.test-shard.result }} serial-canaries=${{ needs.serial-canaries.result }}"
          if [ "${{ needs.static.result }}" != "success" ] \
             || [ "${{ needs.test-shard.result }}" != "success" ] \
             || [ "${{ needs.serial-canaries.result }}" != "success" ]; then
            echo "::error::a required test job did not succeed — see the per-job results above"
            exit 1
          fi

  coverage:
    # NON-required (NOT in branch protection): produces the Codecov signal off
    # the merge-critical path (#879). `codecov/patch` is already non-required, so
    # the merge gate never waits on this. Runs the SAME two-pass split as the old
    # combined job (bulk + serial via --cov-append) so combined coverage
    # semantics — including branch coverage (`branch = true` in pyproject.toml) —
    # are exactly the signal we had before, just no longer on the critical path.
    #
    # NB: COVERAGE_CORE=sysmon is deliberately NOT used. We keep branch coverage
    # on (`branch = true` in pyproject.toml), and sys.monitoring branch coverage
    # requires Python 3.14+ (coverage added it in 7.7.0). On our Python 3.12
    # (the single supported interpreter, ADR-0009) coverage warns and falls back
    # to the default C tracer, so sysmon would buy nothing here. Revisit when the
    # project moves to Python 3.14+ — NOT on a coverage upgrade (branch+sysmon
    # support already exists upstream). See #878.
    name: coverage (Codecov, non-required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-python-env

      - name: Run tests with coverage (two-pass; bulk + serial via --cov-append)
        run: |
          pytest -n auto -m "not slow and not serial" --cov=hangarfit --cov-report=xml
          pytest -m "serial and not slow" --cov=hangarfit --cov-append --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354  # v6.0.1
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  dependency-review:
    # PR-time supply-chain gate (#463): fails a PR that introduces a dependency
    # carrying a known vulnerability, covering BOTH the pip deps (pyproject.toml /
    # requirements-*.txt) and the npm viewer deps (viewer/package-lock.json). This
    # complements — does not replace — the two existing layers: Dependabot (which
    # opens UPDATE PRs for already-landed vulnerable deps) and the weekly OpenSSF
    # Scorecard osv-scan (which catches vulns already sitting on develop). Without
    # this gate a vulnerable dep can sit on develop for up to a week before the
    # weekly scan flags it — the window that surfaced PYSEC-2026-196 (#459). The
    # action diffs the dependency graph between the PR base and head, so it ONLY
    # works on pull_request events (it errors on push); since this workflow also
    # triggers on push to develop/main, the event guard below skips it there.
    name: dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      # Read the dependency graph to diff base..head. No PR comment is posted
      # (comment-summary-in-pr is left off), so pull-requests: write is not needed.
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Dependency review (fail on known-vulnerable deps)
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          # Fail the PR when an introduced dependency has a known advisory of
          # this severity or higher. `high` is the release-blocking bar; tighten
          # to `moderate` to also gate medium-severity advisories.
          fail-on-severity: high

  lockfile-drift:
    # Guards the silent-failure path created by `pip install -e . --no-deps`
    # in the test job: a runtime dep added to pyproject.toml but missing from
    # requirements-dev.txt would install successfully and only surface as an
    # ImportError at test-collection time. This job regenerates the lockfile
    # against the current pyproject.toml and fails if the resolved
    # `package==version` set diverges from what is checked in. See issue #161.
    name: lockfile drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python 3.12
        # Match the regeneration instruction in CLAUDE.md: the single
        # supported Python (3.12) — the interpreter the lockfiles are
        # resolved against and the only version the test job runs.
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install pip-tools (hash-pinned)
        # Hash-pinned via requirements-pip-tools.txt so the guard that
        # enforces lockfile integrity is itself installed with verified
        # integrity — closes the `pipCommand not pinned by hash` Scorecard
        # finding the bare `pip install pip-tools==7.5.3` triggered (#224).
        # The lockfile pins pip-tools==7.5.3, the version CLAUDE.md mandates
        # for regeneration; bump it deliberately, in lockstep with the
        # build-lockfile guard and the regeneration commands in CLAUDE.md.
        run: pip install --require-hashes -r requirements-pip-tools.txt

      - name: Regenerate lockfile against existing pins
        # Copy first so pip-compile honors the committed lockfile as a pin
        # source. Without the copy, pip-compile would freshly resolve every
        # transitive dep against the latest PyPI versions, producing false
        # drift whenever an unrelated transitive package had a new release.
        # With it, the comparison only diverges when pyproject.toml actually
        # demands a different package set.
        #
        # `--no-strip-extras` is explicit so this stays correct across the
        # pip-tools 8.0 default flip (which inverts the strip-extras default
        # and would otherwise silently prune transitive extras the day
        # someone bumps the pin).
        run: |
          cp requirements-dev.txt /tmp/expected.txt
          pip-compile --quiet --generate-hashes --no-strip-extras --extra dev -o /tmp/expected.txt pyproject.toml

      - name: Compare package==version sets
        # A textual diff of the two files is flaky: pip-compile output is not
        # bit-stable across pip-tools versions (hash ordering, comment
        # placement). The actual install-time invariant is the *set* of
        # `package==version` pairs, so extract and compare just that.
        #
        # The extracts are written to real files (not `<(...)` process
        # substitution) so that a `grep` returning zero matches — which
        # would otherwise silently produce two empty streams that diff sees
        # as identical — is caught by the explicit non-empty sanity check.
        # The `|| true` wrap on grep is load-bearing: under GitHub Actions'
        # default `bash -eo pipefail` shell, a no-match grep exits 1, the
        # pipeline exits 1 via pipefail, and `set -e` would kill the step
        # *before* the sanity check could run — meaning the helpful
        # `::error::` annotation below would never reach the operator. The
        # regex starts with [A-Za-z0-9] because PEP 503 allows package
        # names that begin with a digit (e.g., `2to3`); the optional
        # `(\[...\])?` group matches extras-decorated names like
        # `coverage[toml]==X` that `--no-strip-extras` emits — without it,
        # extras would be silently dropped from both sides of the
        # comparison, re-introducing the same silent-skip class.
        run: |
          extract() {
            { grep -E '^[A-Za-z0-9][A-Za-z0-9._-]*(\[[A-Za-z0-9._,-]+\])?==' "$1" || true; } \
              | sed 's/ *\\$//' | sort
          }
          extract requirements-dev.txt > /tmp/committed.set
          extract /tmp/expected.txt    > /tmp/regenerated.set
          if [ ! -s /tmp/committed.set ] || [ ! -s /tmp/regenerated.set ]; then
            echo "::error::extract() produced an empty package set — the regex in .github/workflows/ci.yml no longer matches the lockfile format. Update the guard."
            exit 1
          fi
          # Defense-in-depth (issue #199): the non-empty check above
          # catches a *fully* empty extract, but not a pip-compile run that
          # exits 0 while emitting a *partial* lockfile — if the committed
          # and regenerated files are degraded identically, the diff below
          # passes and a dropped pin goes unnoticed. Assert that every
          # *directly-declared* dependency (pyproject [project.dependencies]
          # + [project.optional-dependencies] dev) survived regeneration.
          # The declaration boundary is the principled line: transitives are
          # pip-compile's concern, and a dropped transitive surfaces via the
          # diff (asymmetric drop) or as an ImportError at test collection.
          # A count-floor would add nothing — a regen-vs-committed shortfall
          # is already an asymmetric diff failure; only this absolute check
          # covers the symmetric-degradation case.
          for pkg in pyyaml shapely matplotlib pytest pytest-cov ruff mypy types-pyyaml types-shapely hypothesis; do
            grep -qE "^${pkg}==" /tmp/regenerated.set || {
              echo "::error::dev lockfile regeneration dropped a declared dependency: ${pkg} — pip-compile may have produced partial output."
              exit 1
            }
          done
          if ! diff -u /tmp/committed.set /tmp/regenerated.set; then
            echo "::error::requirements-dev.txt is out of sync with pyproject.toml. Regenerate on Python 3.12 with pip-tools==7.5.3: pip-compile --generate-hashes --no-strip-extras --extra dev -o requirements-dev.txt pyproject.toml"
            exit 1
          fi

  build-lockfile-drift:
    # Sibling of lockfile-drift, for requirements-build.txt (the
    # hash-pinned build toolchain consumed by the editable install in the
    # test job and by `python -m build` in release.yml). The build
    # lockfile is generated from requirements-build.in, which constrains
    # shared transitive deps (packaging) to requirements-dev.txt via `-c`.
    # Two silent-drift paths this guards:
    #   1. requirements-build.in edited but requirements-build.txt not
    #      regenerated.
    #   2. packaging bumped in requirements-dev.txt but the build lockfile
    #      not regenerated — the test job would then install two different
    #      packaging versions across its dev/build install steps.
    name: build lockfile drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python 3.12
        # The single supported Python (3.12), matching the dev-lockfile guard
        # and the regeneration command documented in CLAUDE.md.
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install pip-tools (hash-pinned)
        # Same hash-pinned bootstrap as the dev-lockfile guard
        # (requirements-pip-tools.txt) — see that step for the full
        # rationale. Kept in lockstep so both guards install the identical
        # pip-tools 7.5.3 with verified integrity.
        run: pip install --require-hashes -r requirements-pip-tools.txt

      - name: Regenerate build lockfile against existing pins
        # Same copy-first rationale as the dev-lockfile guard: seeding with
        # the committed lockfile makes pip-compile honor the existing pins
        # so only a genuine change in requirements-build.in (or in the
        # `-c requirements-dev.txt` constraint it reads) produces drift.
        # --allow-unsafe and --no-strip-extras match the documented
        # regeneration command so setuptools/wheel stay pinned and extras
        # are not pruned.
        run: |
          cp requirements-build.txt /tmp/expected-build.txt
          pip-compile --quiet --generate-hashes --no-strip-extras --allow-unsafe -o /tmp/expected-build.txt requirements-build.in

      - name: Compare package==version sets
        # Identical set-comparison strategy to the dev-lockfile guard (see
        # its comment for the full rationale on why a textual diff is too
        # flaky). Inlined here so it survives independent edits to the
        # sibling job: the `{ grep ... || true; }` wrap is load-bearing
        # under GitHub Actions' default `bash -eo pipefail` — a zero-match
        # grep exits 1 and would abort the step before the non-empty
        # sanity check below could emit its diagnostic.
        run: |
          extract() {
            { grep -E '^[A-Za-z0-9][A-Za-z0-9._-]*(\[[A-Za-z0-9._,-]+\])?==' "$1" || true; } \
              | sed 's/ *\\$//' | sort
          }
          extract requirements-build.txt   > /tmp/committed-build.set
          extract /tmp/expected-build.txt   > /tmp/regenerated-build.set
          if [ ! -s /tmp/committed-build.set ] || [ ! -s /tmp/regenerated-build.set ]; then
            echo "::error::extract() produced an empty package set — the regex in .github/workflows/ci.yml no longer matches the lockfile format. Update the guard."
            exit 1
          fi
          # Defense-in-depth (issue #199): same partial-output guard as the
          # dev-lockfile job, inlined here so it survives independent edits.
          # Asserts the directly-declared build deps (requirements-build.in:
          # build, setuptools, wheel) plus `packaging` — the cross-lockfile
          # skew anchor constrained via `-c requirements-dev.txt`.
          # Transitives (e.g. pyproject-hooks) are out of scope for the same
          # reason as the dev job: their loss surfaces via the diff or a
          # build failure.
          for pkg in build setuptools wheel packaging; do
            grep -qE "^${pkg}==" /tmp/regenerated-build.set || {
              echo "::error::build lockfile regeneration dropped a declared dependency: ${pkg} — pip-compile may have produced partial output."
              exit 1
            }
          done
          if ! diff -u /tmp/committed-build.set /tmp/regenerated-build.set; then
            echo "::error::requirements-build.txt is out of sync. Regenerate on Python 3.12 with pip-tools==7.5.3: pip-compile --generate-hashes --no-strip-extras --allow-unsafe -o requirements-build.txt requirements-build.in"
            exit 1
          fi

  fuzz-lockfile-drift:
    # Sibling of build-lockfile-drift, for requirements-fuzz.txt (the
    # hash-pinned Atheris toolchain consumed only by the nightly fuzz
    # workflow). Source is requirements-fuzz.in, which constrains shared
    # transitives to requirements-dev.txt via `-c`. Guards two silent-drift
    # paths: (1) requirements-fuzz.in edited but the lockfile not regenerated;
    # (2) a constrained transitive bumped in requirements-dev.txt without
    # regenerating here.
    name: fuzz lockfile drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install pip-tools (hash-pinned)
        run: pip install --require-hashes -r requirements-pip-tools.txt

      - name: Regenerate fuzz lockfile against existing pins
        run: |
          cp requirements-fuzz.txt /tmp/expected-fuzz.txt
          pip-compile --quiet --generate-hashes --no-strip-extras -o /tmp/expected-fuzz.txt requirements-fuzz.in

      - name: Compare package==version sets
        run: |
          extract() {
            { grep -E '^[A-Za-z0-9][A-Za-z0-9._-]*(\[[A-Za-z0-9._,-]+\])?==' "$1" || true; } \
              | sed 's/ *\\$//' | sort
          }
          extract requirements-fuzz.txt > /tmp/committed-fuzz.set
          extract /tmp/expected-fuzz.txt > /tmp/regenerated-fuzz.set
          if [ ! -s /tmp/committed-fuzz.set ] || [ ! -s /tmp/regenerated-fuzz.set ]; then
            echo "::error::extract() produced an empty package set — the regex in .github/workflows/ci.yml no longer matches the lockfile format. Update the guard."
            exit 1
          fi
          for pkg in atheris; do
            grep -qE "^${pkg}==" /tmp/regenerated-fuzz.set || {
              echo "::error::fuzz lockfile regeneration dropped a declared dependency: ${pkg} — pip-compile may have produced partial output."
              exit 1
            }
          done
          if ! diff -u /tmp/committed-fuzz.set /tmp/regenerated-fuzz.set; then
            echo "::error::requirements-fuzz.txt is out of sync. Regenerate on Python 3.12 with pip-tools==7.5.3: pip-compile --generate-hashes --no-strip-extras -o requirements-fuzz.txt requirements-fuzz.in"
            exit 1
          fi

  # The Node viewer toolchain (typecheck + lint + build-drift + node-test) lives
  # in its own path-gated workflow, .github/workflows/viewer.yml (#475), so it
  # runs only on viewer-affecting changes instead of on every PR. It is a
  # non-required check, which is what makes the workflow-level `paths:` skip safe
  # (a path-skipped REQUIRED check would deadlock merge).
