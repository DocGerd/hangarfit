# Airfield Herrenteich — real hangar (main building).
#
# This is the REAL hangar, kept separate from the synthetic placeholder in
# data/hangar.yaml (which stays as the project's stable demo/test fixture).
#
# DIMENSIONS (rectangle + door) measured 2026-06-04 by PK from the
# architect's DWG of the main building (distances annotated on the floor
# plan, read to the millimetre and rounded here to the centimetre).
#
# NON-RECTANGULAR FOOTPRINT (L-shape). The real hangar's back-right corner is
# notched out by ~2.36 m (x) × ~9.10 m (y) — that corner is office/annex space,
# NOT hangar floor. Since ADR-0018 (#527) this is MODELLED: the
# `structural_notches` block below subtracts the corner from the hangar floor,
# so `hangarfit check` (and the solver / tow planner) now reject any layout that
# parks — or even overhangs — a plane in it. width_m / length_m below stay the
# full BOUNDING RECTANGLE (15.08 × 31.76); the notch is carved out of it. The
# notch box is DERIVED from the rectangle dims — back-right =
# [width-2.36, width] × [length-9.10, length] — so if length_m / width_m are
# ever re-surveyed, recompute it (the loader validates only that it fits).
#
# ⚠ NO MAINTENANCE BAY. The real hangar has no modelled curtained bay; the
# block below is an inert placeholder that only satisfies the schema (the
# `maintenance_bay` field is required). No layout in this folder names a
# `maintenance.plane`, so the bay keep-out is never triggered.
#
# Coordinates: (0, 0) at the front-left corner of the hangar floor, looking
# down. +x runs right along the door wall, +y runs deeper into the hangar.
# The real door is on a side wall of the building; it is mapped here so the
# door wall is the front wall (y = 0). Front-left (x = 0) corresponds to
# the DWG's north door-jamb (the 0.55 m flank). See
# `docs/architecture/08-crosscutting-concepts.md` "The coordinate
# convention" for the full convention.

length_m: 31.76         # depth from the front (door) wall to the back wall
width_m: 15.08          # left-to-right span along the door wall

door:
  center_x_m: 7.28      # door centre along the front wall (x axis): 0.55 m
                        # of wall to its left (x < 0.55), 1.07 m to its
                        # right — the opening is slightly off-centre
  width_m: 13.46        # clear door opening width

maintenance_bay:
  # INERT PLACEHOLDER — see header. Never triggered (no maintenance plane in
  # this folder's layouts). Small back-left rectangle, well clear of the
  # back-right office notch.
  center_x_m: 2.0
  width_m: 3.0
  depth_m: 2.0

structural_notches:
  # Back-right office/annex corner — a permanent absence of floor (ADR-0018)
  # that makes the building L-shaped. DERIVED from the rectangle:
  # x ∈ [width-2.36, width] = [12.72, 15.08],
  # y ∈ [length-9.10, length] = [22.66, 31.76]. Recompute if the dims change.
  - x_min_m: 12.72
    y_min_m: 22.66
    x_max_m: 15.08
    y_max_m: 31.76

# CALIBRATED for the full real set (#605). The placeholders were 0.3 / 0.2; the
# full set (8 aircraft + Caddy + 2 glider trailers + fixed fuel trailer) is
# INFEASIBLE at 0.3/0.2 and feasible at <=0.22/0.15 (checker-driven search).
# 0.20 m lateral matches real hand-pushed club packing density; 0.15 m vertical
# fixes a too-large wing-layer clearance that falsely rejected legal z-disjoint
# wing-over-tail nestings (the real club clears fins ~0.40 m by hand, well above
# 0.15). Lowering a clearance only RELAXES the constraint, so the existing
# layout.yaml / scenario_demo.yaml stay valid; the synthetic data/ hangar is a
# separate file, untouched.
clearance_m: 0.20            # minimum horizontal gap between any two parts (PARKED)
wing_layer_clearance_m: 0.15 # minimum vertical gap between two parts at the same XY (PARKED)

# Tow-MOTION clearances (#643/#646): the margin the planner keeps while a mover
# is IN MOTION threading past parked bodies, distinct from the PARKED spacing
# above. A spotter hand-clears wingtips far closer during a slow guided slide than
# the long-term parked gap — applying the 0.20 m parked margin during motion
# falsely rejects routable maneuvers (the #642 finding). 0.05 m models the
# hand-cleared motion margin; like the parked values it is measured: false
# (a documented modelling assumption pending on-site measurement). Absent ⇒ the
# motion clearance is the parked clearance (byte-identical plan, ADR-0003).
motion_clearance_m: 0.05            # horizontal gap during tow motion
motion_wing_layer_clearance_m: 0.05 # vertical gap during tow motion

# Spare carts available to the cart_eligible pool. Bounds how many
# cart_eligible planes may sit on carts in one layout; always_cart planes
# get their own carts and do not draw from this pool.
max_carts: 4

# Staging-apron depth (m) in front of the door (ADR-0021). Kept at the default
# (absent => 0 => no apron) — the real apron in front of Herrenteich's door has
# not been measured. Set a number or `auto` to model the tow slide-in; does not
# affect static `hangarfit check` validity.
# apron_depth_m: 0
