# Airfield Herrenteich real fleet — a thin MANIFEST referencing the central
# data/catalog/ (no per-world duplication; the real-spec numbers ARE the
# catalog's numbers, #595/#594).
aircraft:
  - ../../data/catalog/scheibe_falke.yaml
  # The Stemme is hand-positioned on a dolly in the hangar, so it pivots in
  # place — its catalog 10 m turn_radius_m is a TAXI figure, irrelevant to
  # in-hangar maneuvering (a 10 m arc can't thread a deep slot in a 15 m-wide
  # hangar). Model it cart-borne for tow planning via a per-fleet operational
  # override (#595); flight specs stay in the catalog. See #644 / #643.
  - { ref: ../../data/catalog/stemme_s10.yaml, movement_mode: always_cart }
  - ../../data/catalog/aviat_husky.yaml
  - ../../data/catalog/wild_thing.yaml
  - ../../data/catalog/zlin_savage.yaml
  - ../../data/catalog/cessna_140.yaml
  - ../../data/catalog/ctsl.yaml
  - ../../data/catalog/fk9_mkii.yaml

# Non-aircraft ground objects usually on the floor with the fleet (#605/#601).
# Referenced from the central catalog, same as aircraft. The fuel trailer is a
# fixed keep-out; the Caddy + two glider trailers are placed movers (routing
# lands in #602).
ground_objects:
  - ../../data/catalog/maul_fuel_trailer.yaml
  - ../../data/catalog/vw_caddy.yaml
  - ../../data/catalog/glider_trailer_1.yaml
  - ../../data/catalog/glider_trailer_2.yaml
