    measured: false
    notes: "Two-seat self-launching motor glider. WINGS-FOLDED config: wing width = 11.4 m folded span (23 m unfolded). Length 8.42 m, the longest fuselage in the fleet."
    parts:
      - kind: fuselage
        length_m: 8.42
        width_m: 1.18
        offset_x_m: -1.5
        offset_y_m: 0.0
        z_bottom_m: 0.0
        z_top_m: 1.4
      - kind: wing
        length_m: 0.82
        width_m: 11.4
        offset_x_m: 0.0
        offset_y_m: 0.0
        z_bottom_m: 1.9
        z_top_m: 2.1
      - kind: tail            # T-TAIL: horizontal stabilizer HIGH, at the fin top (~2.8 m span est.)
        length_m: 0.8
        width_m: 2.8
        offset_x_m: -5.31
        offset_y_m: 0.0
        z_bottom_m: 1.5
        z_top_m: 1.8
      - kind: vertical_stabilizer  # fin to overall height 1.80 m (folded config; below the 2.0 m wing layer)
        length_m: 1.0
        width_m: 0.15
        offset_x_m: -5.21
        offset_y_m: 0.0
        z_bottom_m: 1.4
        z_top_m: 1.8
    wheels:
      main_offset_x_m: 0.0

