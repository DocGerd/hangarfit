# Case 3 — high-wing wingtip over Fuji's (low-wing) fuselage area is
# VALID because the heights are disjoint enough to clear the 0.2 m
# vertical clearance.
#
# Layout:
#   fuji   at (5, 5, 0, false) — fuselage z [0.0, 1.6]
#   ctsl   at (4, 10, 90, false) — wing centered at world (5, 10),
#       length 1.4 along world +x, width 8.6 along world −y (heading 90
#       maps plane +x → world +x, plane +y → world −y). So ctsl wing in
#       world: x ∈ [4.3, 5.7], y ∈ [5.7, 14.3], z [1.9, 2.2].
#
# Plan-view overlap of ctsl wing × fuji fuselage: x ∈ [4.5, 5.5],
# y ∈ [5.7, 9.0] — a real "in 2D this looks like a collision" zone.
# z-gap = 1.9 − 1.6 = 0.3 m > 0.2 m clearance ⇒ NOT a conflict.
#
# Counterpart non-conflicts that must also be clean here:
#   - ctsl fuselage (y ∈ [9.5, 10.5]) doesn't enter fuji's footprint
#     (fuji fuselage y ∈ [1, 9], fuji wing y ∈ [4.75, 6.25]).
#   - ctsl wing × fuji wing: plan overlap exists, but z-gap = 0.8 m.
#
# A bbox-style implementation that ignores z would mark this invalid.

fleet: ../../data/fleet.yaml
hangar: ../../data/hangar.yaml

placements:
  - plane: fuji
    x_m: 5.0
    y_m: 5.0
    heading_deg: 0.0
    on_carts: false
  - plane: ctsl
    x_m: 4.0
    y_m: 10.0
    heading_deg: 90.0
    on_carts: false
