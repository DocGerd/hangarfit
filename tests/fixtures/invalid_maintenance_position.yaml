# Case 9 — maintenance plane is NOT parked in the back zone.
#
# Hangar is 25 m deep and the maintenance bay is the back 9 m,
# so the bay starts at y = 16. cessna_150's fuselage centroid here
# is at y ≈ 5 — well outside the bay — which must trigger a
# `maintenance_position` conflict.

fleet: ../../data/fleet.yaml
hangar: ../../data/hangar.yaml

maintenance:
  plane: cessna_150

placements:
  - plane: cessna_150
    x_m: 9.0
    y_m: 5.0
    heading_deg: 0.0
    on_carts: false
