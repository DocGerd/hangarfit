[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "hangarfit"
version = "0.1.0"
description = "Helper tool for arranging the flying club fleet in a stack-style hangar — collision checker + visualizer (Phase 1)."
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "Patrick Kuhn" }]
license = "Apache-2.0"
classifiers = []
dependencies = [
  "pyyaml>=6.0",
  "shapely>=2.0,<3",
  "matplotlib>=3.8",
]

[project.optional-dependencies]
dev = ["pytest>=7.4", "pytest-cov>=4.0", "ruff>=0.7.0", "mypy>=1.0", "types-PyYAML", "types-shapely"]

[project.scripts]
hangarfit = "hangarfit.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
markers = [
    "slow: tests that may exceed the default 5 s per-fixture solve budget (excluded from CI default; run on demand via `pytest -m slow`)",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]

[tool.ruff.format]
# Defaults are fine — quote-style="double", indent-style="space", line-ending="lf".

[tool.mypy]
python_version = "3.11"
strict_optional = true
warn_unused_ignores = true
warn_redundant_casts = true

[[tool.mypy.overrides]]
module = "hangarfit.*"
disallow_untyped_defs = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
ignore_errors = false

# matplotlib ships no PEP 561 stubs; ignore its imports rather than
# using an unofficial stub package that may not track the 3.x API.
[[tool.mypy.overrides]]
module = "matplotlib.*"
ignore_missing_imports = true
