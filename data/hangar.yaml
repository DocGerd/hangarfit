# Hangar floor plan.
#
# ALL DIMENSIONS ARE PLACEHOLDERS — replace with real measurements
# before trusting any layout the collision checker validates.
#
# Coordinates: (0, 0) at the front-left corner of the hangar floor,
# looking down. +x runs right along the door wall, +y runs deeper
# into the hangar. See `docs/architecture/08-crosscutting-concepts.md`
# "The coordinate convention" for the full convention.

length_m: 25.0          # depth from front wall (door side) to back wall
width_m: 18.0           # left-to-right span

door:
  center_x_m: 9.0       # door center along the front wall (x axis)
  width_m: 12.0         # door opening width

maintenance_bay:
  # Partial-width, back-anchored rectangle. PLACEHOLDER values — real
  # measurements will reset all three. Right-corner bay so the partial-width
  # path is exercised by the canonical layout.
  center_x_m: 13.5      # right side of the 18 m hangar (placeholder)
  width_m: 9.0          # right half (placeholder)
  depth_m: 9.0          # back nine meters (placeholder)

clearance_m: 0.3        # minimum horizontal gap between any two aircraft parts
wing_layer_clearance_m: 0.2  # minimum vertical gap between two parts at the same XY

# Spare carts available to the cart_eligible pool. Bounds how many
# cart_eligible planes may sit on carts in one layout; always_cart planes
# get their own carts and do not draw from this pool. Absent => 1 (the
# original single-cart rule). Overridable per-invocation with --max-carts.
max_carts: 1

# Staging-apron depth in metres in front of the door (the y < 0 region the tow
# planner stages each plane in before sliding it through the door; ADR-0021).
# Absent => 0 => no apron, reproducing the pre-apron tow plan byte-for-byte.
# Set a number to model the apron, or `auto` to derive it from the fleet
# (~ max plane length + max turn radius). Overridable with --apron-depth.
# A site property, like max_carts; does NOT affect `hangarfit check` validity.
# apron_depth_m: 0
