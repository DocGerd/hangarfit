# Fleet definitions for the flying club.
#
# ALL DIMENSIONS BELOW ARE PLACEHOLDERS — replace with real measurements
# before trusting any layout the collision checker validates. Every
# entry has `measured: false` as a grep handle so you can audit what
# still needs real numbers.
#
# Conventions (see `docs/architecture/08-crosscutting-concepts.md`
# "The coordinate convention" and "The parts model" for the full version):
# - Plane-local coords: +x = forward (toward nose), +y = right (toward right wingtip)
# - Origin of plane-local frame = main-gear / cart centroid
# - Each Part is an oriented rectangle: length_m runs along plane +x,
#   width_m runs along plane +y
# - Heights z_bottom_m / z_top_m are above-ground in world coords
# - struts block (optional) is expanded by the loader into two mirrored
#   strut Parts; cantilever aircraft omit the block entirely
# - turn_radius_m: own-gear minimum taxi turn radius (m). LOAD-BEARING since
#   Phase 3a — consumed by the `towplanner` module's Dubins / Hybrid-A*
#   path planning (it was an unused placeholder through Phase 1/2a). `null`
#   on always_cart planes: they have no own-gear taxi radius, so the
#   towplanner substitutes 0 (pivot-in-place on the cart) via
#   `Aircraft.effective_turn_radius_m()` rather than baking 0 into the data
#   (ADR-0007, fork 4).

aircraft:
  # ----------------------------------------------------------------------------
  # MOTORGLIDER — cantilever high wing, monowheel + outriggers, always on carts
  # ----------------------------------------------------------------------------
  - id: scheibe_falke
    name: "Scheibe SF-25E Falke"
    wing_position: high
    gear: monowheel
    movement_mode: always_cart
    turn_radius_m: null  # always_cart → towplanner uses 0 (pivot); see header + ADR-0007
    measured: false
    notes: "Cantilever wing; outriggers folded into wing footprint at the tips"
    parts:
      - kind: fuselage
        length_m: 7.6
        width_m: 0.7
        offset_x_m: 0.0
        offset_y_m: 0.0
        z_bottom_m: 0.0
        z_top_m: 1.5
      - kind: wing
        length_m: 1.2
        width_m: 18.0
        offset_x_m: 1.5
        offset_y_m: 0.0
        z_bottom_m: 1.9
        z_top_m: 2.1

  # ----------------------------------------------------------------------------
  # TAILWHEEL HIGH-WING — strut-braced, always on own gear
  # ----------------------------------------------------------------------------
  - id: aviat_husky
    name: "Aviat Husky A-1"
    wing_position: high
    gear: tailwheel
    movement_mode: always_own_gear
    turn_radius_m: 5.0
    measured: false
    parts:
      - kind: fuselage
        length_m: 6.88
        width_m: 0.85
        offset_x_m: -1.72
        offset_y_m: 0.0
        z_bottom_m: 0.0
        z_top_m: 1.5
      - kind: wing
        length_m: 1.4
        width_m: 10.82
        offset_x_m: -0.52
        offset_y_m: 0.0
        z_bottom_m: 2.0
        z_top_m: 2.3
    struts:
      fuselage_attach_x_m: -1.22
      fuselage_attach_y_m: 0.425   # ~half fuselage width
      fuselage_attach_z_m: 0.5
      wing_attach_y_m: 1.8
      width_m: 0.05

  # ----------------------------------------------------------------------------
