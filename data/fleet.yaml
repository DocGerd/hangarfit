    gear: nosewheel
    movement_mode: cart_eligible
    tow_pivotable: true  # tail-down nose-lift pivot when towed (#263)
    turn_radius_m: 4.0
    measured: false
    notes: "Cantilever wing (no struts)"
    parts:
