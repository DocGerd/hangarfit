        width_m: 1.0
        offset_x_m: 0.0
        offset_y_m: 0.0
        z_bottom_m: 0.0
        z_top_m: 1.6
      - kind: wing
        length_m: 1.5
        width_m: 9.4
        offset_x_m: 0.5
        offset_y_m: 0.0
        z_bottom_m: 0.8
        z_top_m: 1.1

